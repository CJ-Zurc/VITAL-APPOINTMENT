services:
  vital-appointment-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8009}:${PORT:-8009}"
    environment:
      PORT: ${PORT:-8009}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-BGH_LOCAL_INTERNAL_API_KEY_2026}
    depends_on:
      vital-appointment-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const port=process.env.PORT||8009;const req=http.get({host:'127.0.0.1',port,path:'/'},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  vital-appointment-db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-appointment_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
